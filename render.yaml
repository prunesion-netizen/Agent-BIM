# Render.com Blueprint — Agent BIM Romania
# Deploy: connect repo on Render dashboard, it auto-detects this file

databases:
  - name: agent-bim-db
    plan: free
    databaseName: agent_bim
    user: agent_bim

services:
  # FastAPI Backend
  - type: web
    name: agent-bim-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-bim-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: PYTHON_VERSION
        value: "3.13.0"
    healthCheckPath: /healthcheck

  # React Frontend (static site)
  - type: web
    name: agent-bim-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://agent-bim-api.onrender.com/api/*
      - type: rewrite
        source: /healthcheck
        destination: https://agent-bim-api.onrender.com/healthcheck
      - type: rewrite
        source: /*
        destination: /index.html
