services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_bim
      POSTGRES_PASSWORD: agent_bim
      POSTGRES_DB: agent_bim
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_bim"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://agent_bim:agent_bim@db:5432/agent_bim
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
